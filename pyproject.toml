[tool.black]
line-length = 120
target-version = ["py312"]
[tool.ruff]
line-length = 120
target-version = "py312"
[tool.ruff.lint]
select = ["E", "F", "I", "UP", "B"]
ignore = ["B008", "UP046"]
[tool.mypy]
python_version = "3.12"
strict = true
plugins = ["pydantic.mypy"]
ignore_missing_imports = true

[[tool.mypy.overrides]]
module = ["app.api.*", "app.core.logging"]
disallow_untyped_defs = false

[tool.pytest.ini_options]
asyncio_default_fixture_loop_scope = "function"
